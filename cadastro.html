<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Cadastro</title>

<style>
body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="card shadow-lg p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Criar Conta</h3>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
    <input name="nome" class="form-control mb-2" placeholder="Seu nome" required>
    <input name="matricula" class="form-control mb-2" placeholder="RA" required>
    <input name="password" type="password" class="form-control mb-2" placeholder="Senha" required>
    <input name="confirm_password" type="password" class="form-control mb-2" placeholder="Confirmar senha" required>
    <button class="btn btn-success w-100">Cadastrar</button>
    </form>

    <hr>

    <a href="{{ url_for('login') }}" class="text-center d-block">Já tenho conta</a>
</div>

</body>
</html><!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastro de Aluno</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Criar Conta (RA)</h3>
                        <form method="POST">
                            <label class="form-label">Seu RA</label>
                            <input type="text" name="username" class="form-control mb-3" placeholder="Ex: 123456" required>
                            
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control mb-3" placeholder="Crie uma senha" required>
                            
                            <button type="submit" class="btn btn-success w-100 mb-3">Cadastrar e Entrar</button>
                        </form>
                        
                        <hr>
                        <div class="text-center">
                            <p class="text-muted small mb-2">Já possui um cadastro ativo?</p>
                            <a href="{{ url_for('login') }}" class="btn btn-link text-decoration-none">
                                Voltar para o Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
