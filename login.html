<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Login</h3>
                        <form method="POST">
                            <label class="form-label">Login</label>
                            <input type="text" name="username" class="form-control mb-3" placeholder="Ex: 123456" required>
                            
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control mb-3" placeholder="Crie uma senha" required>
                            
                            <button type="submit" class="btn btn-success w-100 mb-3">Entrar</button>
                        </form>
                        
                        <hr>
                        <div class="text-center">
                            <p class="text-muted small mb-2">Ainda não possui um cadastro ?</p>
                            <a href="{{ url_for('cadastro') }}" class="btn btn-link text-decoration-none">
                                Cadastrar agora
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
