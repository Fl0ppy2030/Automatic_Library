<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Login</title>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="card shadow-lg p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Login</h3>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="RA" required>

        <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required>

        <button class="btn btn-primary w-100">Entrar</button>
    </form>

    <hr>

    <a href="{{ url_for('cadastro') }}" class="text-center d-block">Criar conta</a>
</div>

</body>
</html>
